image: dax:latest

# optional: path to a custom CA certificate to install during dax build
# useful when behind a TLS-inspecting proxy (e.g. Zscaler)
# ca_cert: ~/.zscaler-ca.crt

features:
  - workdir
  - optdir

workdir:
  container: work

optdir:
  host: ~/opt/dax-opt
  container: ~/opt

awsdir:
  mount: ~/.aws

gpgdir:
  mount: ~/.gnupg

msfdir:
  mount: ~/.msf4

dotfiles:
  ro:
    - ~/.zshrc
    - ~/.vimrc
    - ~/.gitconfig
    - ~/.tmux.conf
  rw:
    - ~/.zsh_history
