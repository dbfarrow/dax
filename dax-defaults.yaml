image: dax:latest

# optional: path to a custom CA certificate to install during dax build
# useful when behind a TLS-inspecting proxy (e.g. Zscaler)
# ca_cert: ~/.zscaler-ca.crt

features:
  - workdir
  - optdir

workdir:
  container: work

optdir:
  host: ~/opt/dax-opt
  container: ~/opt

awsdir:
  host: ~/.aws
  container: ~/.aws

gpgdir:
  host: ~/.gnupg
  container: ~/.gnupg

msfdir:
  host: ~/.msf4
  container: ~/.msf4

dotfiles:
  ro:
    - ~/.zshrc
    - ~/.vimrc
    - ~/.gitconfig
    - ~/.tmux.conf
  rw:
    - ~/.zsh_history
